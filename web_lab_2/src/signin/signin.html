<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module">
    import { initTheme } from '../utils/theme.js';
    initTheme();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AW Finance - Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23D4A574'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header id="navbar"></header>

  <main class="flex items-center justify-center py-16 px-4 min-h-screen-70">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-accent">AW Finance</h1>
        <h2 class="mt-3 text-xl font-bold">Welcome back</h2>
        <p class="text-sm mt-1 text-secondary">Sign in to continue learning</p>
      </div>

      <div class="card rounded-xl p-8">
        <form action="#" method="POST" class="space-y-4">
          <div>
            <label for="email" class="block mb-1 text-sm font-medium text-secondary">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required class="w-full px-4 py-2 rounded-lg">
          </div>

          <div>
            <label for="password" class="block mb-1 text-sm font-medium text-secondary">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required class="w-full px-4 py-2 rounded-lg">
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input id="remember" name="remember" type="checkbox" class="w-4 h-4 rounded">
              <label for="remember" class="ml-2 text-sm text-secondary">Remember me</label>
            </div>
            <a href="#" class="text-sm text-accent">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary w-full px-6 py-3 rounded-lg font-medium">Sign In</button>
        </form>

        <p class="text-center text-sm mt-6 text-secondary">
          Don't have an account? <a href="../signup/signup.html" class="text-accent font-medium">Sign up.</a>
        </p>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <script type="module">
    import { initShared } from '../utils/shared.js';
    initShared();
  </script>
</body>
</html>
