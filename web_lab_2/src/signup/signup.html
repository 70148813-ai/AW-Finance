<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module">
    import { initTheme } from '../utils/theme.js';
    initTheme();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AW Finance - Sign Up</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23D4A574'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header id="navbar"></header>

  <main class="flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-accent">AW Finance</h1>
        <h2 class="mt-3 text-xl font-bold">Create your account</h2>
        <p class="text-sm mt-1 text-secondary">Start learning for free today</p>
      </div>

      <div class="card rounded-xl p-8">
        <form action="#" method="POST" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="firstName" class="block text-sm font-medium mb-1 text-secondary">First Name</label>
              <input type="text" id="firstName" name="firstName" placeholder="John" required class="w-full px-4 py-2 rounded-lg">
            </div>
            <div>
              <label for="lastName" class="block text-sm font-medium mb-1 text-secondary">Last Name</label>
              <input type="text" id="lastName" name="lastName" placeholder="Doe" required class="w-full px-4 py-2 rounded-lg">
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium mb-1 text-secondary">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required class="w-full px-4 py-2 rounded-lg">
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium mb-1 text-secondary">Phone <span class="text-muted">(optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" class="w-full px-4 py-2 rounded-lg">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium mb-1 text-secondary">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8" class="w-full px-4 py-2 rounded-lg">
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-medium mb-1 text-secondary">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required class="w-full px-4 py-2 rounded-lg">
          </div>

          <div class="flex items-start gap-3">
            <input type="checkbox" id="terms" name="terms" required class="mt-0.5 w-4 h-4 rounded">
            <label for="terms" class="text-sm text-secondary">
              I agree to the <a href="#" class="text-accent">Terms of Service</a> and <a href="#" class="text-accent">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn-primary w-full px-6 py-3 rounded-lg font-medium">Create Account</button>
        </form>

        <p class="text-center text-sm mt-6 text-secondary">
          Already have an account? <a href="../signin/signin.html" class="text-accent font-medium">Sign in.</a>
        </p>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <script type="module">
    import { initShared } from '../utils/shared.js';
    initShared();
  </script>
</body>
</html>
