<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AW Finance - Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body style="background:#1C1917; color:#FAFAF9; font-family:sans-serif; min-height:100vh;">

  <!-- NAVBAR -->
  <nav style="background:#262626; border-bottom:1px solid #374151;" class="sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="home.html" style="color:#D4A574;" class="text-lg font-bold tracking-tight">AW Finance</a>
      <div class="hidden md:flex items-center gap-8 text-sm">
        <a href="home.html" class="hover:text-white transition" style="color:#A8A29E;">Home</a>
        <a href="about.html" class="hover:text-white transition" style="color:#A8A29E;">About</a>
        <a href="contact.html" class="hover:text-white transition" style="color:#A8A29E;">Contact</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="signin.html" class="text-sm transition" style="color:#A8A29E;">Sign In</a>
        <a href="signup.html" class="text-sm font-medium px-4 py-2 rounded-lg" style="background:#D4A574; color:#1C1917;">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- FORM -->
  <div class="flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">

      <div class="text-center mb-8">
        <a href="home.html" class="text-2xl font-bold" style="color:#D4A574;">AW Finance</a>
        <h1 class="mt-3 text-xl font-bold" style="color:#FAFAF9;">Welcome back</h1>
        <p class="text-sm mt-1" style="color:#A8A29E;">Sign in to continue learning</p>
      </div>

      <div class="rounded-2xl p-8" style="background:#262626; border:1px solid #374151;">

        <form action="#" method="POST">

          <!-- Flowbite Input -->
          <div class="mb-4">
            <label for="email" class="block mb-1 text-sm font-medium" style="color:#A8A29E;">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <!-- Flowbite Input -->
          <div class="mb-4">
            <label for="password" class="block mb-1 text-sm font-medium" style="color:#A8A29E;">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <!-- Flowbite Checkbox -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center">
              <input id="remember" name="remember" type="checkbox" class="w-4 h-4 rounded border" style="accent-color:#D4A574; border-color:#374151;" />
              <label for="remember" class="ml-2 text-sm" style="color:#A8A29E;">Remember me</label>
            </div>
            <a href="#" class="text-sm hover:underline" style="color:#D4A574;">Forgot password?</a>
          </div>

          <!-- Flowbite Button -->
          <button type="submit"
            class="w-full font-medium rounded-lg text-sm px-5 py-3 text-center transition"
            style="background:#D4A574; color:#1C1917;"
            onmouseover="this.style.background='#c49460'" onmouseout="this.style.background='#D4A574'">
            Sign In
          </button>

        </form>

        <!-- Flowbite Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px" style="background:#374151;"></div>
          <span class="text-xs" style="color:#A8A29E;">or continue with</span>
          <div class="flex-1 h-px" style="background:#374151;"></div>
        </div>

        <!-- Flowbite Social Buttons -->
        <div class="grid grid-cols-2 gap-3">
          <button type="button"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-sm font-medium rounded-lg border transition"
            style="background:#1C1917; border-color:#374151; color:#A8A29E;"
            onmouseover="this.style.borderColor='#D4A574'; this.style.color='#FAFAF9';"
            onmouseout="this.style.borderColor='#374151'; this.style.color='#A8A29E';">
            <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-sm font-medium rounded-lg border transition"
            style="background:#1C1917; border-color:#374151; color:#A8A29E;"
            onmouseover="this.style.borderColor='#D4A574'; this.style.color='#FAFAF9';"
            onmouseout="this.style.borderColor='#374151'; this.style.color='#A8A29E';">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
          </button>
        </div>

        <!-- Flowbite helper text -->
        <p class="text-center text-sm mt-6" style="color:#A8A29E;">
          Don't have an account? <a href="signup.html" style="color:#D4A574;" class="font-medium hover:underline">Sign up.</a>
        </p>

      </div>

      <p class="text-center text-xs mt-6" style="color:#374151;">Protected by industry-standard encryption</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer style="background:#262626; border-top:1px solid #374151;" class="py-8">
    <div class="max-w-6xl mx-auto px-6 text-xs text-center" style="color:#A8A29E;">
      2024 AW Finance. All rights reserved. &nbsp;|&nbsp;
      <a href="#" class="hover:text-white transition">Privacy Policy</a> &nbsp;|&nbsp;
      <a href="#" class="hover:text-white transition">Terms of Service</a>
    </div>
  </footer>

</body>
</html>
