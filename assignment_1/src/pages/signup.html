<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AW Finance - Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body style="background:#1C1917; color:#FAFAF9; font-family:sans-serif; min-height:100vh;">

  <!-- NAVBAR -->
  <nav style="background:#262626; border-bottom:1px solid #374151;" class="sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="home.html" style="color:#D4A574;" class="text-lg font-bold tracking-tight">AW Finance</a>
      <div class="hidden md:flex items-center gap-8 text-sm">
        <a href="home.html" class="hover:text-white transition" style="color:#A8A29E;">Home</a>
        <a href="about.html" class="hover:text-white transition" style="color:#A8A29E;">About</a>
        <a href="contact.html" class="hover:text-white transition" style="color:#A8A29E;">Contact</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="signin.html" class="text-sm transition" style="color:#A8A29E;">Sign In</a>
        <a href="signup.html" class="text-sm font-medium px-4 py-2 rounded-lg" style="background:#D4A574; color:#1C1917;">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- FORM -->
  <div class="flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">

      <div class="text-center mb-8">
        <a href="home.html" class="text-2xl font-bold" style="color:#D4A574;">AW Finance</a>
        <h1 class="mt-3 text-xl font-bold" style="color:#FAFAF9;">Create your account</h1>
        <p class="text-sm mt-1" style="color:#A8A29E;">Start learning for free today</p>
      </div>

      <div class="rounded-2xl p-8" style="background:#262626; border:1px solid #374151;">

        <form action="#" method="POST">

          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label for="firstName" class="block text-sm font-medium mb-1" style="color:#A8A29E;">First Name</label>
              <input type="text" id="firstName" name="firstName" placeholder="John" required
                class="border text-sm rounded-lg block w-full p-2.5"
                style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
                onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
            </div>
            <div>
              <label for="lastName" class="block text-sm font-medium mb-1" style="color:#A8A29E;">Last Name</label>
              <input type="text" id="lastName" name="lastName" placeholder="Doe" required
                class="border text-sm rounded-lg block w-full p-2.5"
                style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
                onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
            </div>
          </div>

          <div class="mb-4">
            <label for="email" class="block text-sm font-medium mb-1" style="color:#A8A29E;">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <div class="mb-4">
            <label for="phone" class="block text-sm font-medium mb-1" style="color:#A8A29E;">Phone <span style="color:#374151; font-weight:normal;">(optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000"
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <div class="mb-4">
            <label for="password" class="block text-sm font-medium mb-1" style="color:#A8A29E;">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8"
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <div class="mb-5">
            <label for="confirmPassword" class="block text-sm font-medium mb-1" style="color:#A8A29E;">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required
              class="border text-sm rounded-lg block w-full p-2.5"
              style="background:#1C1917; border-color:#374151; color:#FAFAF9; outline:none;"
              onfocus="this.style.borderColor='#D4A574'" onblur="this.style.borderColor='#374151'" />
          </div>

          <div class="flex items-start gap-3 mb-6">
            <input type="checkbox" id="terms" name="terms" required class="mt-0.5 w-4 h-4 rounded" style="accent-color:#D4A574;" />
            <label for="terms" class="text-sm" style="color:#A8A29E;">I agree to the <a href="#" style="color:#D4A574;" class="hover:underline">Terms of Service</a> and <a href="#" style="color:#D4A574;" class="hover:underline">Privacy Policy</a></label>
          </div>

          <button type="submit"
            class="w-full font-medium rounded-lg text-sm px-5 py-3 text-center transition"
            style="background:#D4A574; color:#1C1917;"
            onmouseover="this.style.background='#c49460'" onmouseout="this.style.background='#D4A574'">
            Create Account
          </button>

        </form>

        <p class="text-center text-sm mt-6" style="color:#A8A29E;">
          Already have an account? <a href="signin.html" style="color:#D4A574;" class="font-medium hover:underline">Sign in.</a>
        </p>

      </div>

      <p class="text-center text-xs mt-6" style="color:#374151;">Joined by 50,000+ finance professionals worldwide</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer style="background:#262626; border-top:1px solid #374151;" class="py-8">
    <div class="max-w-6xl mx-auto px-6 text-xs text-center" style="color:#A8A29E;">
      2024 AW Finance. All rights reserved. &nbsp;|&nbsp;
      <a href="#" class="hover:text-white transition">Privacy Policy</a> &nbsp;|&nbsp;
      <a href="#" class="hover:text-white transition">Terms of Service</a>
    </div>
  </footer>

</body>
</html>
